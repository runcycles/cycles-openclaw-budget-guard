name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.js || (echo "dist/index.js missing" && exit 1)
          test -f dist/index.d.ts || (echo "dist/index.d.ts missing" && exit 1)

      - name: Verify plugin manifest
        run: node -e "JSON.parse(require('fs').readFileSync('openclaw.plugin.json','utf8'))"

      - name: Verify register function
        run: |
          node -e "
            import register from './dist/index.js';
            const empty = register({ enabled: false, cyclesBaseUrl: 'x', cyclesApiKey: 'x', tenant: 'x' });
            if (Object.keys(empty).length !== 0) { throw new Error('disabled should return empty'); }
            const hooks = register({ cyclesBaseUrl: 'http://localhost:8080', cyclesApiKey: 'test', tenant: 'test' });
            const expected = ['before_model_resolve','before_prompt_build','before_tool_call','after_tool_call','agent_end'];
            for (const h of expected) {
              if (typeof hooks[h] !== 'function') { throw new Error('missing hook: ' + h); }
            }
            console.log('All hooks registered correctly');
          "

  publish:
    name: Publish to npm
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    concurrency:
      group: npm-publish
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - run: npm run build

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
